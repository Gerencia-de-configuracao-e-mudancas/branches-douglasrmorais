<!DOCTYPE html>

<body>
    <!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Meu Projeto Simples</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f0f0;
        }
        .container {
            margin-top: 50px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Olá, mundo! 🌎</h1>
        <p>Este é meu primeiro projeto em HTML.</p>

        <br><br>

        <button onclick="mostrarMensagem()">Clique aqui</button>
        <p id="mensagem"></p>
    </div>

    <script>
        function mostrarMensagem() {
            document.getElementById("mensagem").innerText = "Você clicou no botão!";
        }
    </script>

</body>
</html>
</body>
</html>
